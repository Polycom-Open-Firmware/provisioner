  <rect x="0.5" y="0.5" width="479" height="259" rx="10" fill="none" stroke="#9aa1ab" stroke-opacity="0.35"/>
  <text x="464" y="26" text-anchor="end" font-size="11" letter-spacing="1.5" fill="#9aa1ab" fill-opacity="0.7">PLACEHOLDER</text>

  <!-- laptop -->
