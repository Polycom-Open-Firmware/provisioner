<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- Placeholder illustration: BOOT_MODE switches flipped back for normal eMMC boot.
       Replace with a bench photo of the real switch block when one exists. -->
  <rect x="0.5" y="0.5" width="479" height="259" rx="10" fill="none" stroke="#9aa1ab" stroke-opacity="0.35"/>
  <text x="464" y="26" text-anchor="end" font-size="11" letter-spacing="1.5" fill="#9aa1ab" fill-opacity="0.7">PLACEHOLDER</text>

  <!-- DIP switch block, both ON (up) -->
  <rect x="200" y="70" width="80" height="66" rx="6" fill="none" stroke="#9aa1ab" stroke-width="2"/>
  <text x="240" y="64" text-anchor="middle" font-size="11" fill="#6f7680">BOOT_MODE</text>
  <g stroke="#9aa1ab" stroke-width="2">
    <rect x="212" y="80" width="20" height="46" rx="4" fill="none"/>
    <rect x="248" y="80" width="20" height="46" rx="4" fill="none"/>
    <rect x="214.5" y="83" width="15" height="19" rx="3" fill="#9aa1ab" stroke="none"/>
    <rect x="250.5" y="83" width="15" height="19" rx="3" fill="#9aa1ab" stroke="none"/>
  </g>
  <text x="222" y="150" text-anchor="middle" font-size="10" fill="#6f7680">1</text>
  <text x="258" y="150" text-anchor="middle" font-size="10" fill="#6f7680">2</text>
  <text x="240" y="166" text-anchor="middle" font-size="11" fill="#6f7680">back to normal</text>

  <!-- arrow up -->
  <g stroke="#9aa1ab" stroke-width="2" fill="none">
    <path d="M 330 128 V 88"/>
    <path d="M 322 98 L 330 88 L 338 98"/>
  </g>

  <text x="240" y="214" text-anchor="middle" font-size="12" fill="#6f7680">Flip the switches back — they are only read at power-on.</text>
  <text x="240" y="236" text-anchor="middle" font-size="12" fill="#6f7680">The device then boots Linux from the eMMC.</text>
</svg>
