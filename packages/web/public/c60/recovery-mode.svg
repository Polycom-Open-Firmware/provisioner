<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- Placeholder illustration: C60 BOOT_MODE switches set to OFF for USB recovery.
       Replace with a bench photo of the real switch block when one exists. -->
  <rect x="0.5" y="0.5" width="479" height="259" rx="10" fill="none" stroke="#9aa1ab" stroke-opacity="0.35"/>
  <text x="464" y="26" text-anchor="end" font-size="11" letter-spacing="1.5" fill="#9aa1ab" fill-opacity="0.7">PLACEHOLDER</text>

  <!-- device outline (bottom view) -->
  <rect x="150" y="50" width="280" height="150" rx="14" fill="none" stroke="#9aa1ab" stroke-width="2"/>
  <text x="290" y="78" text-anchor="middle" font-size="12" fill="#6f7680">Trio C60 — underside</text>

  <!-- DIP switch block, both OFF (down) -->
  <rect x="250" y="100" width="80" height="66" rx="6" fill="none" stroke="#9aa1ab" stroke-width="2"/>
  <text x="290" y="94" text-anchor="middle" font-size="11" fill="#6f7680">BOOT_MODE</text>
  <g stroke="#9aa1ab" stroke-width="2">
    <rect x="262" y="110" width="20" height="46" rx="4" fill="none"/>
    <rect x="298" y="110" width="20" height="46" rx="4" fill="none"/>
    <rect x="264.5" y="134" width="15" height="19" rx="3" fill="#9aa1ab" stroke="none"/>
    <rect x="300.5" y="134" width="15" height="19" rx="3" fill="#9aa1ab" stroke="none"/>
  </g>
  <text x="272" y="180" text-anchor="middle" font-size="10" fill="#6f7680">1</text>
  <text x="308" y="180" text-anchor="middle" font-size="10" fill="#6f7680">2</text>
  <text x="290" y="196" text-anchor="middle" font-size="11" fill="#6f7680">both OFF</text>

  <!-- USB cable in -->
  <path d="M 40 125 H 128" stroke="#9aa1ab" stroke-width="2" fill="none"/>
  <rect x="128" y="117" width="22" height="16" rx="4" fill="none" stroke="#9aa1ab" stroke-width="2"/>
  <circle cx="40" cy="125" r="5" fill="#9aa1ab"/>
  <text x="84" y="112" text-anchor="middle" font-size="11" fill="#6f7680">USB to computer</text>

  <text x="240" y="238" text-anchor="middle" font-size="12" fill="#6f7680">Both BOOT_MODE switches OFF → the chip enters USB recovery</text>
</svg>
