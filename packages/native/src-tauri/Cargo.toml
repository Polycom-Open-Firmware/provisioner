[package]
name = "provisioner"
version = "0.1.0"
description = "Open Polycom Provisioner"
authors = ["Polycom Open Firmware"]
edition = "2021"

[lib]
name = "provisioner_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
nusb = "0.2"
serialport = "4"
